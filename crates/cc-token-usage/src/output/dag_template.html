<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session DAG — cc-token-usage</title>
<style>
  :root {
    --bg: #0d1117; --border: #21262d; --fg: #c9d1d9; --muted: #8b949e; --dim: #484f58;
    --blue: #58a6ff; --green: #3fb950; --pink: #f778ba; --gold: #d2a850; --purple: #7c3aed;
  }
  .light {
    --bg: #ffffff; --border: #d0d7de; --fg: #24292f; --muted: #57606a; --dim: #8b949e;
    --blue: #0969da; --green: #1a7f37; --pink: #bf3989; --gold: #9a6700; --purple: #6d28d9;
  }
  @media (prefers-color-scheme: light) {
    :root:not(.dark) { --bg: #ffffff; --border: #d0d7de; --fg: #24292f; --muted: #57606a; --dim: #8b949e; --blue: #0969da; --green: #1a7f37; --pink: #bf3989; --gold: #9a6700; --purple: #6d28d9; }
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, monospace; background: var(--bg); color: var(--fg); }
  #header { position:sticky; top:0; z-index:10; padding:12px 20px; border-bottom:1px solid var(--border); background: var(--bg); display:flex; justify-content:space-between; align-items:center; }
  #header h1 { font-size:14px; font-weight:600; }
  #header .meta { font-size:11px; color: var(--muted); }
  #theme-btn { background:var(--border); color:var(--fg); border:none; padding:4px 10px; border-radius:4px; cursor:pointer; font-size:13px; }
  #timeline { padding:20px; }
  .turn { display:flex; align-items:flex-start; gap:8px; padding:5px 0 6px 14px; border-left:3px solid var(--border); margin:1px 0 1px 20px; position:relative; border-radius:0 4px 4px 0; transition: margin-left 0.15s; }
  .turn.tool_use,
  .turn.tool_result { margin-left:44px; border-left-width:2px; }
  .turn:nth-child(even) { background: rgba(128,128,128,0.05); }
  .light .turn:nth-child(even) { background: rgba(0,0,0,0.03); }
  .turn .dot { position:absolute; left:-7px; top:11px; width:8px; height:8px; border-radius:2px; }
  .turn.tool_use .dot,
  .turn.tool_result .dot { width:6px; height:6px; left:-4px; top:11px; }
  .turn .num { position:absolute; right:8px; top:4px; font-size:9px; color:var(--dim); }
  .turn .info { font-size:13px; line-height:1.6; min-width:150px; }
  .turn .info .ts { color:var(--dim); font-size:11px; }
  .turn .info .uuid { color:var(--muted); font-size:10px; }
  .turn .info .type-badge { display:inline-block; font-size:10px; padding:1px 8px; border-radius:3px; margin-top:2px; font-weight:600; text-transform:uppercase; }
  .turn.assistant  .type-badge { background: var(--green); color:#fff; }
  .turn.tool_use   .type-badge { background: var(--blue); color:#fff; }
  .turn.tool_result .type-badge { background: var(--gold); color:#111; }
  .turn.spawn      .type-badge { background: var(--pink); color:#fff; }
  .turn.thinking   .type-badge { background: var(--purple); color:#fff; }
  .turn.user       .type-badge { background: var(--muted); color:#fff; }
  .turn.other      .type-badge { background: var(--dim); color:#fff; }
  .turn.unknown    .type-badge { background: transparent; color:var(--dim); border:1px dashed var(--dim); }
  .turn.assistant  .dot { background: var(--green); }
  .turn.tool_use   .dot { background: var(--blue); }
  .turn.tool_result .dot { background: var(--gold); }
  .turn.spawn      .dot { background: var(--pink); }
  .turn.thinking   .dot { background: var(--purple); }
  .turn.user       .dot { background: var(--muted); }
  .turn.other      .dot { background: var(--dim); }
  .turn.unknown    .dot { background: transparent; border: 1px dashed var(--dim); }
  .turn.assistant  { border-left-color: var(--green); }
  .turn.tool_use   { border-left-color: var(--blue); }
  .turn.tool_result { border-left-color: var(--gold); }
  .turn.spawn      { border-left-color: var(--pink); }
  .turn.thinking   { border-left-color: var(--purple); }
  .turn.user       { border-left-color: var(--muted); }
  .turn.unknown    { border-left-color: var(--dim); border-left-style: dashed; }
  .turn.root { border-left-style: solid; }
  /* tool_use → tool_result paired block */
  .turn.tool_use.has_result { border-bottom: 1px dashed var(--gold); padding-bottom: 2px; margin-bottom: 0; }
  .turn.tool_use .result-inline { margin: 4px 0 0 12px; padding: 3px 10px 4px 12px; border-left: 2px dashed var(--gold); font-size:12px; color:var(--muted); }
  .turn .body { flex:1; font-size:13px; line-height:1.6; }
  .turn .body .tokens { color:var(--gold); }
  .turn .body .tools { color:var(--muted); font-size:12px; margin-left:8px; }
  .turn .body .asst-text { color:var(--fg); font-size:12px; margin-top:4px; max-width:800px; white-space:pre-wrap; word-break:break-word; }
</style>
</head>
<body>
<div id="header">
  <h1>Session Chain <span class="meta" id="session-id"></span></h1>
  <button id="theme-btn" onclick="toggleTheme()">🌓</button>
</div>
<div id="timeline"></div>

<script id="dag-data" type="application/json">
__DAG_DATA__
</script>

<script>
function toggleTheme() {
  const html = document.documentElement;
  if (html.classList.contains('dark')) { html.classList.remove('dark'); localStorage.theme='light'; }
  else if (html.classList.contains('light')) { html.classList.remove('light'); html.classList.add('dark'); localStorage.theme='dark'; }
  else { html.classList.add('dark'); localStorage.theme='dark'; }
}
(function initTheme() {
  const t = localStorage.theme;
  if (t === 'dark') document.documentElement.classList.add('dark');
  else if (t === 'light') document.documentElement.classList.add('light');
})();

(function() {
  const el = document.getElementById('dag-data');
  if (!el || !el.textContent.trim()) { document.getElementById('timeline').innerHTML='<p style="padding:40px;color:#f85149">No data.</p>'; return; }
  const graph = JSON.parse(el.textContent);
  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  document.getElementById('session-id').textContent = graph.sessionId || graph.session_id || '';

  const nodes = graph.nodes || [];
  const edges = graph.edges || [];
  const nodeMap = {};
  nodes.forEach(n => { nodeMap[n.id] = n; });

  const sorted = [...nodes].sort((a,b) => {
    if (a.timestamp !== b.timestamp) return a.timestamp < b.timestamp ? -1 : 1;
    return (a.id||'') < (b.id||'') ? -1 : 1;
  });

  // Find tool_use → tool_result pairs (edge from tool_use to tool_result)
  const pairedResults = new Set();
  sorted.forEach(n => {
    const kind = n.entryType || n.entry_type || '';
    if (kind === 'tool_use') {
      (edges||[]).filter(e => e.from === n.id).forEach(e => {
        const kid = nodeMap[e.to];
        if (kid && (kid.entryType || kid.entry_type) === 'tool_result') {
          pairedResults.add(e.to);
          (n._resultKids = n._resultKids || []).push(kid);
        }
      });
    }
  });

  const container = document.getElementById('timeline');
  let idx = 0;

  sorted.forEach(n => {
    if (pairedResults.has(n.id)) return; // rendered inside tool_use
    idx++;
    const fl = n.fullLabel || n.full_label || '';
    const kind = n.entryType || n.entry_type || 'other';
    const isRoot = !(edges||[]).some(e => e.to === n.id);
    const div = document.createElement('div');
    div.className = 'turn ' + kind + (isRoot ? ' root' : '') + (n._resultKids ? ' has_result' : '');
    const ts = (n.timestamp||'').replace('T',' ').substring(0,19);
    const shortUuid = (n.id||'').substring(0,8);
    const tokens = n.tokens || 0;
    const responseMatch = fl.match(/response: (.+?)(?:\n|$)/);
    const asstText = responseMatch ? responseMatch[1] : '';
    const parentMatch = fl.match(/parent: (\S+)/);
    const parentId = parentMatch ? parentMatch[1] : '';
    const shortParent = parentId.substring(0,8);
    const kids = (edges||[]).filter(e => e.from === n.id).length;

    let bodyHtml = '';
    bodyHtml += '<span class="tokens">'+tokens.toLocaleString()+' tok</span>';
    bodyHtml += '<span class="tools">'+ (n.label||'').replace(/^\d+tok/,'') + '</span>';
    if (kids) bodyHtml += '<span style="color:#f778ba;font-size:11px;margin-left:8px"> → '+kids+' child</span>';
    if (asstText) bodyHtml += '<div class="asst-text">' + esc(asstText) + '</div>';

    // Render paired tool_results inline
    if (n._resultKids) {
      n._resultKids.forEach(rn => {
        bodyHtml += '<div class="result-inline">';
        bodyHtml += '<span class="type-badge" style="display:inline-block;font-size:9px;padding:0px 5px;border-radius:2px;background:var(--gold);color:#111;vertical-align:middle;margin-right:6px">tool_result</span>';
        bodyHtml += '<span style="color:var(--dim);font-size:10px">' + (rn.id||'').substring(0,8) + '</span>';
        bodyHtml += ' <span style="color:var(--dim);font-size:10px">' + ((rn.timestamp||'').replace('T',' ').substring(0,19)) + '</span>';
        bodyHtml += '</div>';
      });
    }

    div.innerHTML =
      '<div class="dot"></div>' +
      '<div class="num">#' + idx + '</div>' +
      '<div class="info"><div class="ts">'+ts+'</div><div class="uuid">'+shortUuid+(parentId ? '<span style="color:var(--dim)">(->'+shortParent+')</span>' : '')+'</div>' +
      '<span class="type-badge">' + kind + '</span></div>' +
      '<div class="body">' + bodyHtml + '</div>';
    container.appendChild(div);
  });
})();
</script>
</body>
</html>
