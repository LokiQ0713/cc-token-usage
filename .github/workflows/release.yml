name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            npm-pkg: cc-token-usage-darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            npm-pkg: cc-token-usage-darwin-x64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            npm-pkg: cc-token-usage-linux-x64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            npm-pkg: cc-token-usage-linux-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            npm-pkg: cc-token-usage-windows-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools (Linux x64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu musl-tools
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-musl]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/cc-token-usage dist/
          chmod +x dist/cc-token-usage
          tar czf cc-token-usage-${{ matrix.target }}.tar.gz -C dist cc-token-usage

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/cc-token-usage.exe" "dist/cc-token-usage.exe"
          Compress-Archive -Path "dist/cc-token-usage.exe" -DestinationPath "cc-token-usage-${{ matrix.target }}.zip"

      - uses: actions/upload-artifact@v4
        if: runner.os != 'Windows'
        with:
          name: ${{ matrix.npm-pkg }}
          path: dist/cc-token-usage

      - uses: actions/upload-artifact@v4
        if: runner.os == 'Windows'
        with:
          name: ${{ matrix.npm-pkg }}
          path: dist/cc-token-usage.exe

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            cc-token-usage-${{ matrix.target }}.tar.gz
            cc-token-usage-${{ matrix.target }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: cc-token-usage-*
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > /tmp/release-notes.md << 'EOF'
          ## Install

          ```bash
          npx cc-token-usage
          ```

          Or with cargo:
          ```bash
          cargo install cc-token-usage
          ```
          EOF
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file /tmp/release-notes.md \
            --latest \
            *.tar.gz 2>/dev/null || true

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}

          for pkg_dir in artifacts/cc-token-usage-*; do
            PKG_NAME=$(basename "$pkg_dir")
            echo "Publishing $PKG_NAME@$VERSION"

            mkdir -p "/tmp/$PKG_NAME"

            # Determine os, cpu, and binary name from package name
            if echo "$PKG_NAME" | grep -q windows; then
              OS="win32"
              BIN_NAME="cc-token-usage.exe"
              cp "$pkg_dir/$BIN_NAME" "/tmp/$PKG_NAME/"
            else
              OS=$(echo "$PKG_NAME" | grep -q darwin && echo darwin || echo linux)
              BIN_NAME="cc-token-usage"
              cp "$pkg_dir/$BIN_NAME" "/tmp/$PKG_NAME/"
              chmod +x "/tmp/$PKG_NAME/$BIN_NAME"
            fi
            CPU=$(echo "$PKG_NAME" | grep -q arm64 && echo arm64 || echo x64)

            cat > "/tmp/$PKG_NAME/package.json" << PKGJSON
          {
            "name": "$PKG_NAME",
            "version": "$VERSION",
            "description": "Platform binary for cc-token-usage ($PKG_NAME)",
            "os": ["$OS"],
            "cpu": ["$CPU"],
            "files": ["$BIN_NAME"],
            "license": "MIT"
          }
          PKGJSON

            cd "/tmp/$PKG_NAME"
            npm publish --access public || true
            cd -
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cd npm-package

          node -e "
            const pkg = require('./package.json');
            pkg.version = '$VERSION';
            pkg.optionalDependencies = {
              'cc-token-usage-darwin-arm64': '$VERSION',
              'cc-token-usage-darwin-x64': '$VERSION',
              'cc-token-usage-linux-x64': '$VERSION',
              'cc-token-usage-linux-arm64': '$VERSION',
              'cc-token-usage-windows-x64': '$VERSION'
            };
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

          npm publish --access public

  publish-crate:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
